- name: create ec2 and r53
  hosts: frontend
  connection: frontend
  vars: 
    ami_id: ami-0220d79f3f480ecf5 
    sg_id: sg-07f9ab5f3954b0990 
    zone_id: "Z00574382GSJ25OUNRI7U"
    domain_name: "devaws.icu"
    instances: 
    - mongodb
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2-instance:
      name: "{{ item }}"
      instance_type: t3.micro
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      tags:
        Name: "{{ item }}"
    loop: "{{ instances }}"
    register: ec2_output

  - name: print the ec2_output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"